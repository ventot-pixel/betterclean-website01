  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: #1a1a1a; background: linear-gradient(180deg, #f6fbf5 0%, #ffffff 26%); }
    h1, h2, h3, h4, .font-display { font-family: 'Sora', sans-serif; }

    :root {
      --green: #3aaa35;
      --green-dark: #2a8226;
      --green-light: #edf7ec;
      --teal: #0fb8c9;
      --dark: #1a2e1a;
      --deeper: #0d180d;
      --pearl: #f7faf6;
      --stroke: #dce8da;
      --orange-soft: #fff1e1;
    }

    .btn-primary {
      background: var(--green); color: #fff; font-family: 'Sora', sans-serif;
      font-weight: 700; padding: 14px 30px; border-radius: 10px; display: inline-block;
      transition: background 0.2s, transform 0.15s; letter-spacing: -0.01em;
      box-shadow: 0 4px 16px rgba(58,170,53,0.28); text-decoration: none; border: none; cursor: pointer;
    }
    .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn-outline {
      border: 2px solid var(--green); color: var(--green); font-family: 'Sora', sans-serif;
      font-weight: 700; padding: 12px 26px; border-radius: 10px; display: inline-block;
      transition: background 0.2s, color 0.2s, border-color 0.2s; text-decoration: none; background: transparent; cursor: pointer;
    }
    .btn-outline:hover { background: var(--green); color: #fff; }
    .btn-soft {
      background: #fff; color: var(--dark); border: 1px solid var(--stroke); font-family: 'Sora', sans-serif;
      font-weight: 700; padding: 12px 22px; border-radius: 10px; display: inline-block; text-decoration: none;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; cursor: pointer;
      box-shadow: 0 10px 28px rgba(26,46,26,0.06);
    }
    .btn-soft:hover { border-color: rgba(58,170,53,0.45); transform: translateY(-1px); box-shadow: 0 14px 36px rgba(58,170,53,0.12); }

    .lang-toggle { display: flex; background: #f1f5f0; border-radius: 6px; overflow: hidden; }
    .lang-btn { padding: 6px 14px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s, color 0.2s; border: none; background: transparent; color: #666; }
    .lang-btn.active { background: var(--green); color: #fff; }
    nav { background: #fff; border-bottom: 1px solid #e8f0e7; position: sticky; top: 0; z-index: 50; }

    .nav-logo-wrap { height: 42px; overflow: hidden; display: flex; align-items: center; }
    @media (min-width: 768px) { .nav-logo-wrap { height: 72px; } }
    .nav-slogan { display: block; color: var(--green); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; width: 100%; margin-top: 3px; }
    .hamburger-btn { display: flex; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; background: #f1f5f0; border-radius: 6px; border: none; cursor: pointer; padding: 8px; flex-shrink: 0; }
    .hamburger-btn span { display: block; width: 100%; height: 2px; background: var(--dark); border-radius: 2px; transition: transform 0.2s, opacity 0.2s; }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav { display: none; background: #fff; border-top: 1px solid #e8f0e7; padding: 8px 24px 24px; }
    .mobile-nav.open { display: block; }
    .mobile-nav a { display: block; padding: 14px 0; font-size: 15px; font-weight: 600; color: #374151; border-bottom: 1px solid #f0f4f0; font-family: 'Sora', sans-serif; text-decoration: none; }
    .mobile-nav a:hover { color: var(--green); }
    .mobile-nav .mobile-cta { border-bottom: none; margin-top: 16px; text-align: center; }

    .hero-wrap {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(58,170,53,0.16), transparent 32%),
        radial-gradient(circle at right 20%, rgba(15,184,201,0.12), transparent 24%),
        linear-gradient(180deg, #f5faf4 0%, #ffffff 70%);
      border-bottom: 1px solid #eef5ed;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.9fr);
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 1024px) {
      .hero-grid { grid-template-columns: 1fr; }
    }

    .surface {
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      box-shadow: 0 22px 44px rgba(26,46,26,0.07);
    }
    .progress-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .progress-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid var(--stroke);
      background: #fff;
      color: #587058;
    }
    .progress-pill.active {
      color: var(--green-dark);
      border-color: rgba(58,170,53,0.4);
      background: var(--green-light);
    }

    .intent-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    @media (max-width: 640px) {
      .intent-toggle { grid-template-columns: 1fr; }
    }
    .intent-card {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      height: 100%;
      text-align: center;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--stroke);
      background: #fff;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 26px rgba(26,46,26,0.04);
    }
    .intent-card:hover { transform: translateY(-1px); border-color: rgba(58,170,53,0.32); }
    .intent-card.active { border-color: rgba(58,170,53,0.48); background: linear-gradient(180deg, #ffffff 0%, #f4fbf3 100%); box-shadow: 0 18px 40px rgba(58,170,53,0.11); }
    .intent-card h2 {
      width: 100%;
      min-height: 5.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .intent-card .muted {
      width: 100%;
      margin: 0;
    }
    .intent-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      background: var(--green-light);
      color: var(--green-dark);
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .planner-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 1024px) {
      .planner-grid { grid-template-columns: 1fr; }
    }

    .panel { padding: 28px; }
    .panel h2 { letter-spacing: -0.03em; }
    .muted { color: #5c715c; line-height: 1.7; }
    .step-card { padding: 24px; border-radius: 20px; border: 1px solid var(--stroke); background: linear-gradient(180deg, #fcfefd 0%, #ffffff 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); }
    .field-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 800; letter-spacing: 0.02em; color: var(--dark); font-family: 'Sora', sans-serif; }
    .field-help { margin-top: -2px; margin-bottom: 12px; color: #687d68; font-size: 13px; line-height: 1.5; }
    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--stroke);
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: rgba(58,170,53,0.56); box-shadow: 0 0 0 4px rgba(58,170,53,0.08); }
    .choice-grid { display: grid; gap: 12px; }
    .choice-card {
      border: 1.5px solid var(--stroke);
      border-radius: 16px;
      padding: 16px 18px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 10px 24px rgba(26,46,26,0.04);
    }
    .choice-card:hover { transform: translateY(-1px); border-color: rgba(58,170,53,0.35); }
    .choice-card.active { border-color: rgba(58,170,53,0.55); background: linear-gradient(180deg, #ffffff 0%, #f4fbf3 100%); box-shadow: 0 18px 38px rgba(58,170,53,0.12); }
    .choice-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .mini-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--orange-soft);
      color: #ba6d11;
    }
    .tiny-note {
      margin-top: 10px;
      padding: 14px 16px;
      background: var(--orange-soft);
      border: 1px solid rgba(186,109,17,0.12);
      border-radius: 16px;
      color: #7f5c24;
      font-size: 13px;
      line-height: 1.6;
    }
    .tiny-note strong { color: #5f4114; }

    .extras-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .extra-card {
      padding: 16px;
      border-radius: 16px;
      border: 1.5px solid var(--stroke);
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .extra-card.active { border-color: rgba(58,170,53,0.52); background: var(--green-light); box-shadow: 0 16px 34px rgba(58,170,53,0.12); }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(76px, 1fr));
      gap: 10px;
    }
    .slot-btn {
      padding: 12px 10px;
      border-radius: 12px;
      border: 1.5px solid var(--stroke);
      background: #fff;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, background 0.2s;
    }
    .slot-btn.active { border-color: rgba(58,170,53,0.58); background: var(--green-light); color: var(--green-dark); }

    .summary-card {
      overflow: hidden;
      position: sticky;
      top: 92px;
    }
    .summary-head {
      padding: 18px 22px;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .summary-body { padding: 22px; }
    .summary-line { display: flex; justify-content: space-between; gap: 16px; padding: 10px 0; border-bottom: 1px solid #edf3ec; font-size: 14px; }
    .summary-line:last-child { border-bottom: none; }
    .summary-callout {
      background: linear-gradient(180deg, #f8fbf7 0%, #eef7ed 100%);
      border: 1px solid #e0ecdf;
      border-radius: 18px;
      padding: 16px;
      color: #576f57;
      font-size: 14px;
      line-height: 1.6;
      margin: 18px 0 22px;
    }
    .scope-item { border-bottom: 1px solid #edf3ec; }
    .scope-head {
      width: 100%;
      background: transparent;
      border: none;
      padding: 14px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      color: var(--dark);
      cursor: pointer;
      text-align: left;
    }
    .scope-body {
      display: none;
      padding: 0 0 14px;
      color: #5b735b;
      font-size: 14px;
      line-height: 1.7;
    }
    .scope-item.open .scope-body { display: block; }

    .hidden-panel { display: none; }
    .step-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .success-box {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f3fbf2 0%, #ffffff 100%);
      border: 1px solid rgba(58,170,53,0.25);
      color: #496149;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<nav class="px-6 py-4">

<section class="hero-wrap">
  <div class="max-w-6xl mx-auto px-6 py-12 md:py-16">
    <div class="hero-grid">
      <div class="surface panel">
        <div class="progress-bar" id="progressBar">
          <span class="progress-pill active" data-step="1" data-en="Service" data-fi="Palvelu"></span>
          <span class="progress-pill" data-step="2" data-en="Date &amp; Area" data-fi="Ajankohta &amp; Alue"></span>
          <span class="progress-pill" data-step="3" data-en="Confirm" data-fi="Vahvista"></span>
        </div>
        <div class="intent-toggle">
          <button class="intent-card active" id="bookingModeBtn" type="button" onclick="setMode('booking')">
            <span class="intent-badge" data-en="Ready to book" data-fi="Valmis varaamaan"></span>
            <h2 class="text-2xl font-display font-bold mb-2" style="letter-spacing: -0.03em;" data-en="Build your home cleaning request" data-fi="Rakenna kotisiivouspyyntösi"></h2>
            <p class="muted" data-en="For customers who already know they want regular home cleaning and want to choose the service setup before we confirm the booking." data-fi="Asiakkaille, jotka tietävät haluavansa kotisiivousta ja haluavat valita palvelun rakenteen ennen kuin vahvistamme varauksen."></p>
          </button>
          <button class="intent-card" id="inquiryModeBtn" type="button" onclick="setMode('inquiry')">
            <span class="intent-badge" style="background:#eff9ff;color:#0d7480;" data-en="Need guidance" data-fi="Tarvitsetko apua?"></span>
            <h2 class="text-2xl font-display font-bold mb-2" style="letter-spacing: -0.03em;" data-en="Ask for a quote first" data-fi="Pyydä tarjous ensin"></h2>
            <p class="muted" data-en="For customers who are still comparing, unsure about the right service, or not ready to choose a date and time yet." data-fi="Asiakkaille, jotka vertailevat vielä, miettivät oikeaa palvelua tai eivät ole valmiita valitsemaan päivää ja kellonaikaa vielä."></p>
          </button>
        </div>

        <div id="bookingPanel">
          <div class="step-card" id="bookingStep1">
            <h2 class="text-4xl font-display font-extrabold mb-3" style="letter-spacing: -0.04em; color: var(--dark);" data-en="Tell us about the home you need cleaned" data-fi="Kerro kodista, johon tarvitset siivousta"></h2>
            <p class="muted mb-8" data-en="This structured request helps us recommend the right visit length, organise the right cleaner, and reply faster with a confident next step." data-fi="Tämä jäsennelty pyyntö auttaa meitä suosittelemaan oikean käyntikeston, järjestämään sopivan siivoojan ja vastaamaan nopeammin varmemmalla seuraavalla askeleella."></p>

            <div class="grid md:grid-cols-2 gap-5 mb-6">
              <div>
                <label class="field-label" for="homeSize" data-en="Apartment size" data-fi="Asunnon koko"></label>
                <select id="homeSize" onchange="updateBookingSummary()">
                  <option value="studio" data-en="Under 50m²" data-fi="Alle 50m²">Alle 50m²</option>
                  <option value="small" selected data-en="50 - 89m²" data-fi="50 - 89m²">50 - 89m²</option>
                  <option value="medium" data-en="90 - 119m²" data-fi="90 - 119m²">90 - 119m²</option>
                  <option value="large" data-en="120 - 154m²" data-fi="120 - 154m²">120 - 154m²</option>
                  <option value="xlarge" data-en="155m² or larger" data-fi="155m² tai suurempi">155m² tai suurempi</option>
                </select>
              </div>
              <div>
                <label class="field-label" for="cleanDuration" data-en="Cleaning duration" data-fi="Siivouksen kesto"></label>
                <select id="cleanDuration" onchange="updateBookingSummary()">
                  <option value="4">4h</option>
                  <option value="5">5h</option>
                  <option value="6" selected data-en="6h (recommendation)" data-fi="6h (suositus)">6h (suositus)</option>
                  <option value="7">7h</option>
                  <option value="8">8h</option>
                </select>
              </div>
            </div>

            <div class="mb-6">
              <label class="field-label" data-en="How often do you want your home cleaned?" data-fi="Kuinka usein haluat kotisiivouksen?"></label>
              <p class="field-help" data-en="Recurring cleaning usually gives the best long-term value and the most consistent result." data-fi="Toistuva siivous antaa yleensä parhaan pitkäaikaisen arvon ja tasaisimman lopputuloksen."></p>
              <div class="choice-grid">
                <button type="button" class="choice-card" id="freq-weekly" onclick="selectFrequency('weekly')">
                  <div class="choice-row">
                    <div>
                      <strong data-en="Every week" data-fi="Joka viikko"></strong>
                      <p class="text-sm text-gray-500 mt-1" data-en="Best for busy households that want continuous calm" data-fi="Paras kiireisille kodeille, jotka haluavat jatkuvaa arjen helpotusta"></p>
                    </div>
                  </div>
                </button>
                <button type="button" class="choice-card active" id="freq-biweekly" onclick="selectFrequency('biweekly')">
                  <div class="choice-row">
                    <div>
                      <strong data-en="Every second week" data-fi="Joka toinen viikko"></strong>
                      <p class="text-sm text-gray-500 mt-1" data-en="A balanced rhythm for most premium home cleaning clients" data-fi="Tasapainoinen rytmi useimmille premium-kotisiivouksen asiakkaille"></p>
                    </div>
                    <span class="mini-tag" data-en="Most popular" data-fi="Suosituin"></span>
                  </div>
                </button>

    <div class="border-t border-white/10 pt-6 flex flex-col md:flex-row justify-between items-center gap-3 text-xs">
      <p>© 2026 BetterClean. <span data-en="All rights reserved." data-fi="Kaikki oikeudet pidätetään."></span></p>
      <p data-en="Reducing Footprints, Refreshing Spaces." data-fi="Vähennämme Jalanjälkiä, Virkistämme Tiloja."></p>
    </div>
  </div>
</footer>

<script>
  let currentLang = 'fi';

  function setLang(lang) {
    currentLang = lang;

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
    });

    document.querySelectorAll('[data-en]').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (!text) return;

      if (el.tagName === 'A' || el.tagName === 'BUTTON' || el.tagName === 'P' ||
          el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3' ||
          el.tagName === 'H4' || el.tagName === 'SPAN' || el.tagName === 'LABEL' ||
          el.tagName === 'LI' || el.tagName === 'STRONG' || el.tagName === 'TD' ||
          el.tagName === 'TH' || el.tagName === 'DIV') {
        el.innerHTML = text;
      } else {
        el.textContent = text;
      }
    });

    document.documentElement.lang = lang;
  }

  function toggleMobileNav() {
    document.getElementById('mobileNav').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('open');
  }
  function closeMobileNav() {
    document.getElementById('mobileNav').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }

  const originalSetLang = setLang;
  setLang = function(lang) {
    originalSetLang(lang);
    refreshUi();
  };

  const bookingState = {
    step: 1,
    mode: 'booking',
    size: 'small',
    duration: 6,
    frequency: 'biweekly',
    extras: [],
    slot: '',
    address: '',
    postcode: '',
    pets: false
  };

  function getFrequencyLabel(key, lang) {
    const labels = {
      weekly: { en: 'Every week', fi: 'Joka viikko' },
      biweekly: { en: 'Every second week', fi: 'Joka toinen viikko' },
      monthly: { en: 'Every four weeks', fi: 'Joka neljäs viikko' },
      once: { en: 'One time only', fi: 'Vain kerran' }
    };
    return labels[key][lang];
  }

  function getServiceLabel(lang) {
    if (bookingState.mode === 'inquiry') {
      const service = document.getElementById('inqService').selectedOptions[0];
      return service ? service.textContent : (lang === 'fi' ? 'Tarjouskysely' : 'Quote inquiry');
    }
    return lang === 'fi' ? 'Kotisiivous' : 'Home cleaning';
  }

  function formatPriceFi(amount) {
    return (amount % 1 === 0 ? String(amount) : amount.toFixed(2).replace('.', ',')) + ' €';
  }

  function calculateEstimate() {
    const recurring = bookingState.frequency !== 'once';
    const rate = recurring ? PRICES.recurring : PRICES.oneTime;
    const totalHours = bookingState.duration + bookingState.extras.length;
    return rate * totalHours;
  }

  function setMode(mode) {
    bookingState.mode = mode;
    document.getElementById('bookingPanel').style.display = mode === 'booking' ? 'block' : 'none';
    document.getElementById('inquiryPanel').style.display = mode === 'inquiry' ? 'block' : 'none';
    document.getElementById('bookingModeBtn').classList.toggle('active', mode === 'booking');
    document.getElementById('inquiryModeBtn').classList.toggle('active', mode === 'inquiry');
    document.querySelectorAll('.booking-only').forEach(el => el.style.display = mode === 'booking' ? '' : 'none');
    document.querySelectorAll('.inquiry-only').forEach(el => el.style.display = mode === 'inquiry' ? '' : 'none');
    document.getElementById('progressBar').style.display = mode === 'booking' ? 'flex' : 'none';
    refreshUi();
  }

  function goBookingStep(step) {
    bookingState.step = step;
    document.getElementById('bookingStep1').style.display = step === 1 ? 'block' : 'none';
    document.getElementById('bookingStep2').style.display = step === 2 ? 'block' : 'none';
    document.getElementById('bookingStep3').style.display = step === 3 ? 'block' : 'none';
    document.querySelectorAll('.progress-pill').forEach(pill => {
      pill.classList.toggle('active', Number(pill.dataset.step) === step);
    });
    refreshUi();
  }

  function selectFrequency(key) {
    bookingState.frequency = key;
    ['weekly', 'biweekly', 'monthly', 'once'].forEach(name => {
      document.getElementById('freq-' + name).classList.toggle('active', name === key);
    });
    refreshUi();
  }

  function toggleExtra(name) {
    if (bookingState.extras.includes(name)) {
      bookingState.extras = bookingState.extras.filter(item => item !== name);
    } else {
      bookingState.extras.push(name);
    }
    document.getElementById('extra-' + name).classList.toggle('active', bookingState.extras.includes(name));
    refreshUi();
  }

  function selectSlot(slot) {
    bookingState.slot = slot;
    document.querySelectorAll('.slot-btn').forEach(btn => btn.classList.toggle('active', btn.textContent === slot || slot.includes(btn.textContent)));
    refreshUi();
  }

  function updateBookingSummary() {
    bookingState.size = document.getElementById('homeSize').value;
    bookingState.duration = Number(document.getElementById('cleanDuration').value);
    bookingState.address = document.getElementById('streetAddress') ? document.getElementById('streetAddress').value.trim() : '';
    bookingState.postcode = document.getElementById('postcode') ? document.getElementById('postcode').value.trim() : '';
    bookingState.pets = document.getElementById('petsHome') ? document.getElementById('petsHome').checked : false;
    refreshUi();
  }

  function updateInquirySummary() {
    refreshUi();
  }

  function toggleScope(button) {
    button.parentElement.classList.toggle('open');
  }

  function refreshUi() {
    const lang = currentLang || 'fi';
    document.getElementById('summaryTitle').textContent = bookingState.mode === 'booking'
      ? (lang === 'fi' ? 'Kotisiivouspyyntö' : 'Home Cleaning Request')
      : (lang === 'fi' ? 'Tarjouskysely' : 'Quote Inquiry');
    document.getElementById('summaryMode').textContent = bookingState.mode === 'booking'
      ? (lang === 'fi' ? 'Varauspyyntö' : 'Booking request')
      : (lang === 'fi' ? 'Kysely' : 'Inquiry');
    document.getElementById('summaryService').textContent = getServiceLabel(lang);
    document.getElementById('summaryDuration').textContent = bookingState.duration + 'h';
    document.getElementById('summaryFrequency').textContent = getFrequencyLabel(bookingState.frequency, lang);
    const extraLabels = {
      fridge: { en: 'Fridge', fi: 'Jääkaappi' },
      oven: { en: 'Oven', fi: 'Uuni' },
      sauna: { en: 'Sauna', fi: 'Sauna' }
    };
    const extrasText = bookingState.extras.length
      ? bookingState.extras.map(item => extraLabels[item][lang]).join(', ')
      : (lang === 'fi' ? 'Vain siivoustarvikkeet' : 'Cleaning supplies only');
    document.getElementById('summaryExtras').textContent = extrasText;
    document.getElementById('summaryEstimate').textContent = formatPriceFi(calculateEstimate());
    const contactMethod = document.getElementById('inqContactMethod');
    if (contactMethod) {
      document.getElementById('summaryInquiryContact').textContent = contactMethod.options[contactMethod.selectedIndex].textContent;
    }
    const areaInput = document.getElementById('inqArea');
    if (areaInput) {
      document.getElementById('summaryInquiryArea').textContent = areaInput.value.trim() || (lang === 'fi' ? 'Vahvistetaan' : 'To be confirmed');
    }
  }

  function submitBookingRequest() {
    const lang = currentLang || 'fi';
    const first = document.getElementById('bookFirstName').value.trim();
    const last = document.getElementById('bookLastName').value.trim();
    const email = document.getElementById('bookEmail').value.trim();
    const phone = document.getElementById('bookPhone').value.trim();
    const notes = document.getElementById('bookNotes').value.trim();
    const extrasText = bookingState.extras.length ? bookingState.extras.join(', ') : 'none';
    const subject = (lang === 'fi' ? 'BetterClean varauspyyntö - ' : 'BetterClean booking request - ') + [first, last].filter(Boolean).join(' ');
    const body = [
      lang === 'fi' ? 'Uusi BetterClean varauspyyntö' : 'New BetterClean booking request',
      '',
      (lang === 'fi' ? 'Palvelu: ' : 'Service: ') + (lang === 'fi' ? 'Kotisiivous' : 'Home cleaning'),
      (lang === 'fi' ? 'Kesto: ' : 'Duration: ') + bookingState.duration + 'h',
      (lang === 'fi' ? 'Toistuvuus: ' : 'Frequency: ') + getFrequencyLabel(bookingState.frequency, lang),
      (lang === 'fi' ? 'Lisäpalvelut: ' : 'Additional services: ') + extrasText,
      (lang === 'fi' ? 'Arvioitu yhteensä: ' : 'Estimated total: ') + formatPriceFi(calculateEstimate()),
      (lang === 'fi' ? 'Osoite: ' : 'Address: ') + (bookingState.address || '-'),
      (lang === 'fi' ? 'Postinumero: ' : 'Postcode: ') + (bookingState.postcode || '-'),
      (lang === 'fi' ? 'Toivottu aika: ' : 'Preferred time: ') + (bookingState.slot || '-'),
      (lang === 'fi' ? 'Lemmikit kotona: ' : 'Pets at home: ') + (bookingState.pets ? (lang === 'fi' ? 'Kyllä' : 'Yes') : (lang === 'fi' ? 'Ei' : 'No')),
      '',
      (lang === 'fi' ? 'Nimi: ' : 'Name: ') + [first, last].filter(Boolean).join(' '),
      'Email: ' + (email || '-'),
      (lang === 'fi' ? 'Puhelin: ' : 'Phone: ') + (phone || '-'),
      (lang === 'fi' ? 'Lisätiedot: ' : 'Notes: ') + (notes || '-')
    ].join('\n');
    window.location.href = 'mailto:info@betterclean.fi?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    document.getElementById('bookingSuccess').style.display = 'block';
  }

  function submitInquiryRequest() {
    const lang = currentLang || 'fi';
    const service = document.getElementById('inqService').options[document.getElementById('inqService').selectedIndex].textContent;
    const area = document.getElementById('inqArea').value.trim();
    const name = document.getElementById('inqName').value.trim();
    const phone = document.getElementById('inqPhone').value.trim();
    const email = document.getElementById('inqEmail').value.trim();
    const size = document.getElementById('inqSize').options[document.getElementById('inqSize').selectedIndex].textContent;
    const method = document.getElementById('inqContactMethod').options[document.getElementById('inqContactMethod').selectedIndex].textContent;
    const need = document.getElementById('inqNeed').value.trim();
    const subject = (lang === 'fi' ? 'BetterClean tarjouskysely - ' : 'BetterClean quote inquiry - ') + (name || service);
    const body = [
      lang === 'fi' ? 'Uusi BetterClean tarjouskysely' : 'New BetterClean quote inquiry',
      '',
      (lang === 'fi' ? 'Kiinnostuksen kohde: ' : 'Interested service: ') + service,
      (lang === 'fi' ? 'Alue tai postinumero: ' : 'Area or postcode: ') + (area || '-'),
      (lang === 'fi' ? 'Kodin koko: ' : 'Home size: ') + (size || '-'),
      (lang === 'fi' ? 'Toivottu yhteydenotto: ' : 'Preferred contact method: ') + method,
      '',
      (lang === 'fi' ? 'Nimi: ' : 'Name: ') + (name || '-'),
      (lang === 'fi' ? 'Puhelin: ' : 'Phone: ') + (phone || '-'),
      'Email: ' + (email || '-'),
      '',
      (lang === 'fi' ? 'Tarve / viesti: ' : 'Need / message: ') + (need || '-')
    ].join('\n');
    window.location.href = 'mailto:info@betterclean.fi?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    document.getElementById('inquirySuccess').style.display = 'block';
  }

  goBookingStep(1);
  selectFrequency('biweekly');
  setMode('booking');
  setLang('fi');
</script>

</body>
</html>
