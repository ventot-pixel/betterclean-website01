<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="14" fill="#3aaa35"/>
  <!-- Latitude lines -->
  <ellipse cx="16" cy="16" rx="14" ry="6" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
  <!-- Vertical meridian -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
  <!-- Outer circle border -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#2a8226" stroke-width="1.5"/>
  <!-- Horizontal equator -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="#fff" stroke-width="1.2" opacity="0.5"/>
  <!-- Continent shape (simplified Europe/Africa blob) -->
  <path d="M14 8 Q16 7 17 9 L18 12 Q19 14 17 15 L16 18 Q15 20 14 18 L13 15 Q11 13 12 11 Z" fill="#fff" opacity="0.9"/>
  <!-- Small continent right (Americas hint) -->
  <path d="M9 11 Q10 10 11 12 L11 15 Q10 16 9 14 Z" fill="#fff" opacity="0.7"/>
</svg>
