<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetterClean — Tampere</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: #1a1a1a; }
    h1, h2, h3, h4, .font-display { font-family: 'Sora', sans-serif; }

    :root {
      --green: #3aaa35;
      --green-dark: #2a8226;
      --green-light: #edf7ec;
      --teal: #0fb8c9;
      --dark: #1a2e1a;
    }

    .btn-primary {
      background: var(--green);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 8px;
      display: inline-block;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: -0.01em;
      box-shadow: 0 4px 16px rgba(58,170,53,0.28);
    }
    .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-outline {
      border: 2px solid var(--green);
      color: var(--green);
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 8px;
      display: inline-block;
      transition: background 0.2s, color 0.2s;
    }
    .btn-outline:hover { background: var(--green); color: #fff; }

    /* Lang toggle */
    .lang-toggle { display: flex; background: #f1f5f0; border-radius: 6px; overflow: hidden; }
    .lang-btn {
      padding: 6px 14px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border: none;
      background: transparent;
      color: #666;
    }
    .lang-btn.active { background: var(--green); color: #fff; }

    /* Sections */
    .section-green { background: var(--green-light); }
    .section-dark { background: var(--dark); color: #fff; }

    /* Check list */
    .check-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .check-icon { width: 22px; height: 22px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

    /* Pricing card */
    .price-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(58,170,53,0.08);
      border: 1px solid #e8f5e8;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .price-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(58,170,53,0.18); }
    .price-card.featured { border: 2px solid var(--green); position: relative; }
    .price-badge {
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #fff; font-size: 12px; font-weight: 700;
      padding: 4px 16px; border-radius: 20px; font-family: 'Sora', sans-serif;
      white-space: nowrap;
    }

    /* Reason card */
    .reason-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(58,170,53,0.07);
    }
    .reason-num {
      width: 40px; height: 40px; background: var(--green); color: #fff;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 14px;
    }

    /* Step */
    .step-circle {
      width: 56px; height: 56px; border-radius: 50%; background: var(--green);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px;
      margin: 0 auto 16px; box-shadow: 0 4px 16px rgba(58,170,53,0.3);
    }

    /* Hero */
    .hero-bg {
      background: linear-gradient(135deg, #edf7ec 0%, #d4eed3 60%, #c2e8c0 100%);
    }

    /* Nav */
    nav { background: #fff; border-bottom: 1px solid #e8f0e7; position: sticky; top: 0; z-index: 50; }

    /* Animations */
    [data-lang] { transition: opacity 0.2s; }

    /* Testimonial */
    .testimonial-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .stars { color: #f5a623; font-size: 18px; letter-spacing: 2px; }

    /* Form */
    input, select, textarea {
      width: 100%; padding: 12px 16px; border: 1.5px solid #d1e8d0;
      border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green); }
    label { font-weight: 500; font-size: 14px; margin-bottom: 4px; display: block; color: #444; }
  </style>
</head>

<style>
  .service-opt input { display: none; }
  .time-btn.selected, .size-btn.selected { border-color: var(--green) !important; background: var(--green-light) !important; color: var(--dark); }
  .pay-method-btn.selected { border-color: var(--green) !important; background: var(--green-light) !important; color: var(--dark); }
  .cal-day { width: 100%; aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .cal-day:hover:not(.cal-past):not(.cal-empty) { background: var(--green-light); }
  .cal-day.cal-selected { background: var(--green) !important; color: #fff !important; font-weight: 700; }
  .cal-day.cal-today { color: var(--green); font-weight: 700; }
  .cal-day.cal-past { color: #d1d5db; cursor: default; }
  .cal-day.cal-empty { cursor: default; }
</style>

<script>
  // ── Booking state ──
  const booking = { service: 'home', size: 'small', date: null, time: null };
  let calYear, calMonth;

  // ── Calendar ──
  const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_FI = ['Tammikuu','Helmikuu','Maaliskuu','Huhtikuu','Toukokuu','Kesäkuu','Heinäkuu','Elokuu','Syyskuu','Lokakuu','Marraskuu','Joulukuu'];

  function initCal() {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
    renderCal();
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCal();
  }

  function renderCal() {
    const lang = window.currentLang || 'fi';
    const months = lang === 'fi' ? MONTHS_FI : MONTHS_EN;
    document.getElementById('cal-month').textContent = `${months[calMonth]} ${calYear}`;

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
    const startOffset = firstDay === 0 ? 6 : firstDay - 1; // Mon-first
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);

    for (let i = 0; i < startOffset; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day cal-empty';
      grid.appendChild(empty);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(calYear, calMonth, d);
      const isPast = date < today;
      const isSun = date.getDay() === 0;
      const isSelected = booking.date && booking.date.getTime() === date.getTime();
      const div = document.createElement('div');
      div.className = 'cal-day' + (isPast || isSun ? ' cal-past' : '') + (date.getTime() === today.getTime() ? ' cal-today' : '') + (isSelected ? ' cal-selected' : '');
      div.textContent = d;
      if (!isPast && !isSun) {
        div.onclick = () => selectDate(date);
      }
      grid.appendChild(div);
    }
  }

  function selectDate(date) {
    booking.date = date;
    renderCal();
    // Update summary
    const lang = window.currentLang || 'fi';
    const months = lang === 'fi' ? MONTHS_FI : MONTHS_EN;
    document.getElementById('summary-date').textContent = `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
  }

  function selectTime(btn, time) {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    booking.time = time;
    document.getElementById('summary-time').textContent = time;
  }

  function selectSize(btn, size) {
    document.querySelectorAll('.size-btn').forEach(b => {
      b.classList.remove('selected');
      b.style.borderColor = '';
      b.style.background = '';
    });
    btn.classList.add('selected');
    booking.size = size;
  }

  // ── Service radio styling ──
  document.querySelectorAll('input[name="service"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.querySelectorAll('.service-opt').forEach(opt => {
        opt.style.borderColor = '';
        opt.style.background = '';
      });
      this.closest('.service-opt').style.borderColor = 'var(--green)';
      this.closest('.service-opt').style.background = 'var(--green-light)';
      booking.service = this.value;
      const serviceNames = { home: ['Home Cleaning','Kotisiivous'], deep: ['Deep Cleaning','Syväsiivous'], office: ['Office Cleaning','Toimistosiivous'], event: ['After-Event Cleaning','Tapahtumanjälkeinen Siivous'] };
      const lang = window.currentLang || 'fi';
      document.getElementById('summary-service').textContent = serviceNames[this.value][lang === 'fi' ? 1 : 0];
    });
  });

  // ── Step navigation ──
  function goToStep(n) {
    [1,2,3,4].forEach(i => {
      document.getElementById('step-' + i).classList.add('hidden');
    });
    document.getElementById('step-' + n).classList.remove('hidden');
    updateStepIndicators(n);

    if (n === 3) {
      const lang = window.currentLang || 'fi';
      const serviceNames = { home: ['Home Cleaning','Kotisiivous'], deep: ['Deep Cleaning','Syväsiivous'], office: ['Office Cleaning','Toimistosiivous'], event: ['After-Event Cleaning','Tapahtumanjälkeinen Siivous'] };
      const months = lang === 'fi' ? MONTHS_FI : MONTHS_EN;
      document.getElementById('pay-service-name').textContent = serviceNames[booking.service][lang === 'fi' ? 1 : 0];
      if (booking.date) document.getElementById('pay-datetime').textContent = `${booking.date.getDate()} ${months[booking.date.getMonth()]} · ${booking.time || ''}`;
      document.getElementById('pay-address').textContent = document.getElementById('inp-address').value;
    }
    document.getElementById('contact').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function updateStepIndicators(n) {
    [2,3].forEach(i => {
      const circle = document.getElementById('ind-' + i + '-circle');
      const label = document.getElementById('ind-' + i + '-label');
      if (i <= n) {
        circle.style.background = 'var(--green)';
        circle.style.color = '#fff';
        if (label) { label.style.color = 'var(--green)'; }
      } else {
        circle.style.background = '#f3f4f6';
        circle.style.color = '#9ca3af';
        if (label) { label.style.color = '#9ca3af'; }
      }
    });
  }

  // ── Payment method ──
  function selectPayMethod(btn, method) {
    document.querySelectorAll('.pay-method-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const isCard = method === 'card';
    document.getElementById('card-form').classList.toggle('hidden', !isCard);
    document.getElementById('redirect-notice').classList.toggle('hidden', isCard);
  }

  // ── Card formatting ──
  function formatCard(el) {
    let v = el.value.replace(/\D/g, '').slice(0, 16);
    el.value = v.replace(/(.{4})/g, '$1 ').trim();
  }
  function formatExpiry(el) {
    let v = el.value.replace(/\D/g, '').slice(0, 4);
    if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
    el.value = v;
  }

  // ── Submit ──
  function submitBooking() {
    goToStep(4);
  }

  // ── Init ──
  initCal();
  // Set default summary values
  document.getElementById('summary-service').textContent = window.currentLang === 'fi' ? 'Kotisiivous' : 'Home Cleaning';
</script>

<!-- ═══════════════════════ LANGUAGE SCRIPT ═══════════════════════ -->
<script>
  let currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;

    // Update toggle buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
    });

    // Update all translatable elements
    document.querySelectorAll('[data-en]').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (!text) return;

      // Handle elements that are links/buttons (set text content)
      if (el.tagName === 'A' || el.tagName === 'BUTTON' || el.tagName === 'P' || el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3' || el.tagName === 'H4' || el.tagName === 'SPAN' || el.tagName === 'LABEL' || el.tagName === 'LI') {
        el.innerHTML = text;
      } else if (el.tagName === 'OPTION') {
        el.textContent = text;
      } else {
        el.textContent = text;
      }
    });

    // Update html lang attr
    document.documentElement.lang = lang;
  }

  // Initialize English on load
  setLang('fi');
</script>
