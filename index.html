<style>
  .service-opt input { display: none; }
  .time-btn.selected, .size-btn.selected { border-color: var(--green) !important; background: var(--green-light) !important; color: var(--dark); }
  .pay-method-btn.selected { border-color: var(--green) !important; background: var(--green-light) !important; color: var(--dark); }
  .cal-day { width: 100%; aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .cal-day:hover:not(.cal-past):not(.cal-empty) { background: var(--green-light); }
  .cal-day.cal-selected { background: var(--green) !important; color: #fff !important; font-weight: 700; }
  .cal-day.cal-today { color: var(--green); font-weight: 700; }
  .cal-day.cal-past { color: #d1d5db; cursor: default; }
  .cal-day.cal-empty { cursor: default; }
</style>

<script>
  const booking = { service: 'home', size: 'small', date: null, time: null };
  let calYear, calMonth;
  const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_FI = ['Tammikuu','Helmikuu','Maaliskuu','Huhtikuu','Toukokuu','Kesäkuu','Heinäkuu','Elokuu','Syyskuu','Lokakuu','Marraskuu','Joulukuu'];

  function initCal() { const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth(); renderCal(); }
  function changeMonth(dir) { calMonth += dir; if (calMonth > 11) { calMonth = 0; calYear++; } if (calMonth < 0) { calMonth = 11; calYear--; } renderCal(); }
  function renderCal() {
    const lang = window.currentLang || 'fi';
    const months = lang === 'fi' ? MONTHS_FI : MONTHS_EN;
    document.getElementById('cal-month').textContent = `${months[calMonth]} ${calYear}`;
    const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const startOffset = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);
    for (let i = 0; i < startOffset; i++) { const e = document.createElement('div'); e.className = 'cal-day cal-empty'; grid.appendChild(e); }
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(calYear, calMonth, d);
      const isPast = date < today; const isSun = date.getDay() === 0;
      const isSelected = booking.date && booking.date.getTime() === date.getTime();
      const div = document.createElement('div');
      div.className = 'cal-day' + (isPast || isSun ? ' cal-past' : '') + (date.getTime() === today.getTime() ? ' cal-today' : '') + (isSelected ? ' cal-selected' : '');
      div.textContent = d;
      if (!isPast && !isSun) { div.onclick = () => selectDate(date); }
      grid.appendChild(div);
    }
  }
  function selectDate(date) {
    booking.date = date; renderCal();
    const lang = window.currentLang || 'fi';
    const months = lang === 'fi' ? MONTHS_FI : MONTHS_EN;
    document.getElementById('summary-date').textContent = `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
  }
  function selectTime(btn, time) { document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); booking.time = time; document.getElementById('summary-time').textContent = time; }
  function selectSize(btn, size) { document.querySelectorAll('.size-btn').forEach(b => { b.classList.remove('selected'); b.style.borderColor = ''; b.style.background = ''; }); btn.classList.add('selected'); booking.size = size; updateWidgetPrice(); }

  function updateWidgetPrice() {
    const lang = window.currentLang || 'fi';
    const est = calcWidgetEstimate(booking.service, booking.size);
    const priceEl = document.getElementById('widget-price-display');
    const hoursEl = document.getElementById('widget-hours-label');
    const labelEl = document.getElementById('widget-price-label');
    if (!est) {
      // Specialty / custom quote
      priceEl.textContent = lang === 'fi' ? 'Tarjouspyyntö' : 'Request a quote';
      hoursEl.setAttribute('data-en', 'We\'ll send a personalised quote');
      hoursEl.setAttribute('data-fi', 'Lähetämme henkilökohtaisen tarjouksen');
      hoursEl.textContent = lang === 'fi' ? 'Lähetämme henkilökohtaisen tarjouksen' : 'We\'ll send a personalised quote';
      labelEl.setAttribute('data-en', 'Pricing'); labelEl.setAttribute('data-fi', 'Hinta');
      labelEl.textContent = lang === 'fi' ? 'Hinta' : 'Pricing';
    } else {
      priceEl.textContent = est.price + ' €';
      const hoursEn = est.hours + 'h · incl. VAT 25.5%';
      const hoursFi = est.hours + 'h · sis. ALV 25,5%';
      hoursEl.setAttribute('data-en', hoursEn); hoursEl.setAttribute('data-fi', hoursFi);
      hoursEl.textContent = lang === 'fi' ? hoursFi : hoursEn;
      labelEl.setAttribute('data-en', 'Estimated total'); labelEl.setAttribute('data-fi', 'Arvioitu hinta');
      labelEl.textContent = lang === 'fi' ? 'Arvioitu hinta' : 'Estimated total';
    }
  }
  document.querySelectorAll('input[name="service"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.querySelectorAll('.service-opt').forEach(opt => { opt.style.borderColor = ''; opt.style.background = ''; });
      this.closest('.service-opt').style.borderColor = 'var(--green)';
      this.closest('.service-opt').style.background = 'var(--green-light)';
      booking.service = this.value;
      const serviceNames = { home: ['Essential Home Care','Peruskodin Hoito'], deep: ['Signature Deep Clean','Syväsiivous'], office: ['Move / Reset Cleaning','Muutto- ja Nollaussiivous'], event: ['Specialty Services','Erikoispalvelut'] };
      const lang = window.currentLang || 'fi';
      document.getElementById('summary-service').textContent = serviceNames[this.value][lang === 'fi' ? 1 : 0];
      updateWidgetPrice();
    });
  });
  function goToStep(n) {
    [1,2,3,4].forEach(i => document.getElementById('step-' + i).classList.add('hidden'));
    document.getElementById('step-' + n).classList.remove('hidden');
    updateStepIndicators(n);
    if (n === 3) {
      const lang = window.currentLang || 'fi';
      const serviceNames = { home: ['Essential Home Care','Peruskodin Hoito'], deep: ['Signature Deep Clean','Syväsiivous'], office: ['Move / Reset Cleaning','Muutto- ja Nollaussiivous'], event: ['Specialty Services','Erikoispalvelut'] };
      const months = lang === 'fi' ? MONTHS_FI : MONTHS_EN;
      document.getElementById('pay-service-name').textContent = serviceNames[booking.service][lang === 'fi' ? 1 : 0];
      if (booking.date) document.getElementById('pay-datetime').textContent = `${booking.date.getDate()} ${months[booking.date.getMonth()]} · ${booking.time || ''}`;
      document.getElementById('pay-address').textContent = document.getElementById('inp-address').value;
    }
    document.getElementById('contact').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  function updateStepIndicators(n) {
    [2,3].forEach(i => {
      const circle = document.getElementById('ind-' + i + '-circle');
      const label = document.getElementById('ind-' + i + '-label');
      if (i <= n) { circle.style.background = 'var(--green)'; circle.style.color = '#fff'; if (label) label.style.color = 'var(--green)'; }
      else { circle.style.background = '#f3f4f6'; circle.style.color = '#9ca3af'; if (label) label.style.color = '#9ca3af'; }
    });
  }
  function selectPayMethod(btn, method) {
    document.querySelectorAll('.pay-method-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const isCard = method === 'card';
    document.getElementById('card-form').classList.toggle('hidden', !isCard);
    document.getElementById('redirect-notice').classList.toggle('hidden', isCard);
  }
  function formatCard(el) { let v = el.value.replace(/\D/g, '').slice(0, 16); el.value = v.replace(/(.{4})/g, '$1 ').trim(); }
  function formatExpiry(el) { let v = el.value.replace(/\D/g, '').slice(0, 4); if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2); el.value = v; }
  function submitBooking() { goToStep(4); }
  initCal();
  document.getElementById('summary-service').textContent = 'Peruskodin Hoito';
  updateWidgetPrice();
</script>

<script>
  let currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
    });
    document.querySelectorAll('[data-en]').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (!text) return;
      if (el.tagName === 'A' || el.tagName === 'BUTTON' || el.tagName === 'P' || el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3' || el.tagName === 'H4' || el.tagName === 'SPAN' || el.tagName === 'LABEL' || el.tagName === 'LI') {
        el.innerHTML = text;
      } else if (el.tagName === 'OPTION') {
        el.textContent = text;
      } else {
        el.textContent = text;
      }
    });
    document.documentElement.lang = lang;
  }

  function toggleMobileNav() {
    document.getElementById('mobileNav').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('open');
  }
  function closeMobileNav() {
    document.getElementById('mobileNav').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }

  // Initialize Finnish on load
  setLang('fi');
</script>
