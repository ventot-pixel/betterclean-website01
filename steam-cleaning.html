           data-fi="Ei kaikille pinnoille  -  esimerkiksi puulattiat vaativat varovaisuutta, koska liiallinen kosteus voi aiheuttaa käyristymistä. Myös herkät laminaatit ja sinetöimättömät luonnonkivet tarvitsevat erityisarviointia. Ennen aloittamista tiimimme arvioi jokaisen pinnan kelpoisuuden. Höyry on erittäin tehokas ja täysin turvallinen kaakeleille, saumoille, lasille, ruostumattomalle teräkselle, posliinille, vinyyliille ja useimmille sinetöidyille kiville."></p>

        <p data-en="Yes. Steam at 140°C+ kills mould spores at the root, including in grout lines and behind tile edges where standard cleaning products cannot penetrate. This makes steam cleaning particularly effective in Finnish bathrooms and saunas where high humidity creates ideal conditions for mould growth. Regular steam cleaning every 3-6 months is the most effective prevention strategy."
           data-fi="Kyllä. Yli 140°C:n höyry tappaa homeitiöt juuresta, myös saumoissa ja kaakelirenkaiden takana, joihin tavalliset siivoustuotteet eivät pysty tunkeutumaan. Tämä tekee höyrypesuista erityisen tehokkaita suomalaisissa kylpyhuoneissa ja saunoissa, joissa korkea kosteus luo ihanteelliset olosuhteet homeenkasvulle. Säännöllinen höyrypesu 3-6 kuukauden välein on tehokkain ehkäisystrategia."></p>

           data-fi="Suosittelemme ammattimaista höyrypesuuta saumoille ja kaakeleille 3-6 kuukauden välein, riippuen kylpyhuoneen käyttötiheydestä ja tuuletuksesta. Suomalaisissa kodeissa, joissa kylpyhuoneet ovat päivittäisessä käytössä ja usein rajallisella tuuletuksella, neljännesvuosittainen höyrypesu pitää homeen ja kalkin parhaiten kurissa. Ammattimaisten käyntien välillä suihkun jälkeinen säännöllinen pyyhkiminen auttaa merkittävästi."></p>

<!-- ═══════════════════════ LANGUAGE SCRIPT ═══════════════════════ -->
<script>
  let currentLang = 'fi';

  function setLang(lang) {
    currentLang = lang;

    // Update toggle buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
    });

    // Update all translatable elements
    document.querySelectorAll('[data-en]').forEach(el => {
      const text = el.getAttribute('data-' + lang);
      if (!text) return;

      if (el.tagName === 'A' || el.tagName === 'BUTTON' || el.tagName === 'P' || el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3' || el.tagName === 'H4' || el.tagName === 'SPAN' || el.tagName === 'LABEL' || el.tagName === 'LI') {
        el.innerHTML = text;
      } else if (el.tagName === 'OPTION') {
        el.textContent = text;
      } else {
        el.textContent = text;
      }
    });

    // Update html lang attr
    document.documentElement.lang = lang;
  }

  function toggleMobileNav() {
    document.getElementById('mobileNav').classList.toggle('open');
    document.getElementById('hamburger').classList.toggle('open');
  }
  function closeMobileNav() {
    document.getElementById('mobileNav').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  }

  // Initialize Finnish on load
  setLang('fi');
</script>
